---
- name: Create IPA/IdM server backup
  hosts: ipabackup
  become: true
  gather_facts: true
  vars_files:
    - vault_ipa.yml
  vars:
    ipabackup_logs: true
    ipabackup_online: false
    ipabackup_to_controller: true
    ipabackup_keep_on_server: false
    ipabackup_controller_path: /tmp/backup
  roles:
    - role: redhat.rhel_idm.ipabackup
      state: present
